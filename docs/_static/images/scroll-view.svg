    <tspan x="20" dy="28">|09:12 test 1 passed                   |</tspan>
    <tspan x="20" dy="28">|09:12 test 2 passed                   |</tspan>
    <tspan x="20" dy="28">|09:13 report generated                |</tspan>
    <tspan x="20" dy="28">|09:14 grading pending                 |</tspan>
