    <tspan x="20" dy="20">|                                                           | | |Arrows: move                      |</tspan>
    <tspan x="20" dy="20">+-----------------------------------------------------------+ | |Enter: open                       |</tspan>
    <tspan x="20" dy="20">                                                              | |q: close                          |</tspan>
    <tspan x="20" dy="20">                                                              | +----------------------------------+</tspan>
