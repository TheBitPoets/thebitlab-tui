<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="440" viewBox="0 0 1040 440" role="img" aria-labelledby="title desc">
  <title id="title">Wide synthetic student dashboard</title>
  <desc id="desc">Ten synthetic student panels use the Phase 4 two-column ASCII layout.</desc>
  <rect width="1040" height="440" rx="8" fill="#171717"/>
