    <tspan x="20" dy="20">|Status: ready                                              | | |Notes: add boundary cases         |</tspan>
    <tspan x="20" dy="20">+-----------------------------------------------------------+ | +----------------------------------+</tspan>
    <tspan x="20" dy="20">+ Workspace ------------------------------------------------+ | + Ultimo dettaglio test -----------+</tspan>
    <tspan x="20" dy="20">|Path: C:/training/sample-lab                               | | |Passed: 6                         |</tspan>
    <tspan x="20" dy="20">|Files: 4                                                   | | |Failed: 1                         |</tspan>
    <tspan x="20" dy="20">+-----------------------------------------------------------+ | +----------------------------------+</tspan>
